<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>v2w - 截图转Word</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>📸 v2w</h1>
            <p class="subtitle">截图识别公式等转 Word</p>
            <p class="description">上传包含文字和数学公式的截图，自动转换为可编辑的 Word 文档</p>
        </header>

        <main>
            <div class="upload-section">
                <div class="upload-area" id="uploadArea">
                    <svg class="upload-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12" />
                    </svg>
                    <p class="upload-text">点击或拖拽图片到此处</p>
                    <p class="upload-hint">支持 PNG, JPEG, WebP, BMP, TIFF 格式</p>
                    <input type="file" id="fileInput" accept="image/png,image/jpeg,image/jpg,image/webp,image/bmp,image/tiff" hidden>
                </div>

                <div class="preview-section" id="previewSection" style="display: none;">
                    <img id="preview" src="" alt="预览图片">
                    <button class="btn btn-secondary" id="clearBtn">清除</button>
                </div>

                <button class="btn btn-primary" id="convertBtn" disabled>
                    <span id="btnText">开始转换</span>
                </button>

                <div class="progress-bar" id="progressBar" style="display: none;">
                    <div class="progress-fill" id="progressFill"></div>
                </div>

                <div class="status-message" id="statusMessage"></div>
            </div>

            <div class="features">
                <h2>功能特性</h2>
                <div class="feature-grid">
                    <div class="feature-card">
                        <div class="feature-icon">📝</div>
                        <h3>文字识别</h3>
                        <p>基于 EasyOCR，支持中英文识别</p>
                    </div>
                    <div class="feature-card">
                        <div class="feature-icon">🔢</div>
                        <h3>公式识别</h3>
                        <p>使用 pix2tex 进行 LaTeX OCR</p>
                    </div>
                    <div class="feature-card">
                        <div class="feature-icon">✏️</div>
                        <h3>可编辑公式</h3>
                        <p>转换为 OMML，支持 Word 和 MathType 编辑</p>
                    </div>
                    <div class="feature-card">
                        <div class="feature-icon">📄</div>
                        <h3>Word 输出</h3>
                        <p>生成标准 .docx 格式文档</p>
                    </div>
                </div>
            </div>
        </main>

        <footer>
            <p>
                <a href="/docs" target="_blank">API 文档</a> ·
                <a href="https://github.com/rs-v/v2w" target="_blank">GitHub</a> ·
                <span>MIT License</span>
            </p>
        </footer>
    </div>

    <script src="/static/js/app.js"></script>
</body>
</html>
